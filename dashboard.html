<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Kasir KOPIRATES</title>

<link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

<h1>☕ Dashboard Kasir KOPIRATES</h1>

<div class="grid">

<div class="card">
<h3>Total Order</h3>
<div class="big" id="totalOrder">0</div>
</div>

<div class="card">
<h3>Total Pendapatan</h3>
<div class="big">Rp <span id="income">0</span></div>
</div>

<div class="card">
<h3>Menu Terlaris</h3>
<div class="big" id="bestMenu">-</div>
</div>

<div class="card">
<h3>Status</h3>
<div id="notif">Menunggu order...</div>
</div>

</div>

<h2 class="chart-title">Grafik Penjualan</h2>

<canvas id="salesChart"></canvas>

<div class="order-list">

<h2>Order Masuk</h2>

<div id="orders"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="js/dashboard.js"></script>

</body>

</html>
